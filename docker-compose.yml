services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Downstream stub: echoes back whatever it receives (great for eyeballing headers).
  echo:
    image: mendhak/http-https-echo:31
    environment:
      HTTP_PORT: "8080"
    ports:
      - "8081:8080"

  gateway:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      echo:
        condition: service_started
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DOWNSTREAM_ECHO_URI: http://echo:8080
      DOWNSTREAM_FLAKY_URI: http://echo:8080
    ports:
      - "8080:8080"
